version: "3.8"

services:
  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: academic_development_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: academic_development
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./MainService/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  # ── Backend (Express API) ──────────────────────────────────────
  backend:
    build:
      context: ./MainService
      dockerfile: Dockerfile
    container_name: mainservice
    restart: unless-stopped
    env_file:
      - ./MainService/.env
    environment:
      DB_HOST: db
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ── Frontend (React + Nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
